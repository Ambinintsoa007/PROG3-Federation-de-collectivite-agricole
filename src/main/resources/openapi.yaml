openapi: 3.0.3
info:
  title: Federation Agricole API
  description: >
    Cette API permet de digitaliser les processus administratifs de la féderations agricoles à Madagascar. 
    Elle facilite la mise en relation entre les agriculteurs et les exportateurs.
  version: 1.0.0

tags:
  - name: Collectivités
    description: "Gestion de l'ouverture et des statistiques des collectivités agricoles."
  - name: Membres
    description: "Gestions des adhésion, des parrainages et des profiles."
  - name: Trésorerie
    description: "Suivi des cotisations, des paiements et des comptes bancaires/mobiles."
  - name: Activités
    description: "Planification et suivi de l'assiduité aux assemblés et formations."

paths:
  /collectivites:
    post:
      tags:
        - Collectivités
      summary: Créer une nouvelle collectivités.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationCollectivite'
      responses:
        '201':
          description: "Collectivité créé avec succès."
        '400':
          description: "Conditions non remplis."

  /collectivites/{collectiviteId}/membres:
    post:
      tags:
        - Membres
      summary: Admettre un nouveau membre dans un collectivité bien définit.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          description: "ID de la collectivité que le membre souhaite rejoindre"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NouveauMembre'
      responses:
        '201':
          description: "Nouveau ajouté avec succès"
        '400':
          description: "Information manquant ! (Parrain invalide, paiement manquant, etc..)"

  /membres/{idMembre}/cotisations:
    post:
      tags:
        - Trésorerie
      summary: Enregistrement de la cotisations d'un membres.
      parameters:
        - name: idMembre
          in: path
          required: true
          description: ID du membre qui va cotiser.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cotisation'
      responses:
        '201':
          description: "Cotisation créé avec succès"
        '400':
          description: "Erreur d'information (id, montant, type de paiement,... manquant)"

  /collectivites/{collectiviteId}/comptes:
    post:
      tags:
        - Trésorerie
      summary: "Ajout d'un compte (Caisse, Bancaire ou Mobile) à une collectivité."
      parameters:
        - name: collectiviteId
          in: path
          required: true
          description: "ID du collectivités à qui on va ajouter un compte."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Compte'
      responses:
        '201':
          description: "Compte créé avec succès"
        '400':
          description: "Information manquante !"

  /collectivites/{collectiviteId}/activites:
    post:
      tags:
        - Activités
      summary: Créer une activité pour une collectivité.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationActivite'
      responses:
        '201':
          description: "Activité créée avec succès."
        '400':
          description: "Données invalides."
        '404':
          description: "Collectivité introuvable."

    get:
      tags:
        - Activités
      summary: Lister les activités d'une collectivité.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Liste des activités retournée avec succès."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'

  /collectivites/{collectiviteId}/activites/{activiteId}:
    get:
      tags:
        - Activités
      summary: Détails d'une activité spécifique.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
        - name: activiteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Détails de l'activité retournés."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'

  /federation/activites:
    post:
      tags:
        - Activités
      summary: Créer une activité au niveau de la fédération.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationActivite'
      responses:
        '201':
          description: "Activité fédérale créée."
    get:
      tags:
        - Activités
      summary: Lister les activités de la fédération.
      responses:
        '200':
          description: "Liste des activités fédérales."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'

  /federation/statistiques/rapport-global:
    get:
      tags:
        - Activités
      summary: "Rapport global annuel/mensuel de la fédération (Section H)"
      parameters:
        - name: dateDebut
          in: query
          required: true
          schema: { type: string, format: date }
        - name: dateFin
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: "Rapport global généré."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RapportGlobal'

  /collectivites/{collectiviteId}/activites/{activiteId}/presences:
    post:
      tags:
        - Activités
      summary: Enregistrer la feuille de présence d'une activité.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
        - name: activiteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreationPresence'
      responses:
        '201':
          description: "Présences enregistrées avec succès."
        '400':
          description: "Données invalides."
        '404':
          description: "Activité ou collectivité introuvable."

    get:
      tags:
        - Activités
      summary: Voir la fiche de présence complète d'une activité.
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
        - name: activiteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Fiche de présence retournée avec succès."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Presence'

  /collectivites/{collectiviteId}/statistiques/rapport-mensuel:
    get:
      tags:
        - Collectivités
      summary: Rapport mensuel global d'une collectivité pour la fédération
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
        - name: mois
          in: query
          required: true
          description: "Mois concerné au format YYYY-MM"
          schema:
            type: string
      responses:
        '200':
          description: "Rapport mensuel généré avec succès."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuel'
        '404':
          description: "Collectivité introuvable."

  /collectivites/{collectiviteId}/membres/{membreId}/statistiques:
    get:
      tags:
        - Collectivités
      summary: Statistiques détaillées d'un membre actif
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
        - name: membreId
          in: path
          required: true
          schema:
            type: string
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: "Statistiques du membre calculées avec succès."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiquesMembre'
        '400':
          description: "Membre démissionnaire ou données invalides."
        '404':
          description: "Membre ou collectivité introuvable."

components:
  schemas:
    CreationCollectivite:
      type: object
      required: [nom, numero, ville, specialite, membresFondateurs,responsableIds]
      properties:
        nom:
          type: string
        numero:
          type: string
        ville:
          type: string
        specialite:
          type: string
        membresFondateurs:
          type: array
          items:
            type: string
          minItems: 10
          description: "Liste des 10 membres minimum"
        responsableIds:
          type: object
          required: [president, tresorier, secretaire]
          properties:
            president:
              type: string
            tresorier:
              type: string
            secretaire:
              type: string
    NouveauMembre:
      type: object
      required: [ nom, prenoms, dateNaissance, genre, adresse, parrainages, referencePaiementTotal ]
      properties:
        nom: { type: string }
        prenoms: { type: string }
        dateNaissance: { type: string, format: date }
        genre: { type: string, enum: [ MASCULIN, FEMININ ] }
        adresse: { type: string }
        metier: { type: string }
        telephone: { type: string }
        email: { type: string, format: email }
        parrainages:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/ParrainageDetail'
          description: "Min 2 parrains confirmés. Règle: Locaux >= Externes."
        referencePaiementTotal:
          type: string
          description: "Référence du paiement: 50.000 Ar + Cotisation annuelle complète"

    ParrainageDetail:
      type: object
      required: [ parrainId, natureRelation ]
      properties:
        parrainId: { type: string }
        natureRelation: { type: string, example: "Famille, ami, collègue" }

    Cotisation:
      type: object
      required: [typeCotisation, montant, datePaiement, modePaiement]
      properties:
        typeCotisation:
          type: string
          enum: [MENSUELLE, ANNUELLE]
        montant:
          type: integer
        datePaiement:
          type: string
          format: date
        modePaiement:
          type: string
          enum: [ESPECE, MOBILE_MONEY, VIREMENT]
    Compte:
      type: object
      required: [typeCompte, solde, dateDernierSolde]
      properties:
        typeCompte:
          type: string
          enum: [CAISSE, BANCAIRE, MOBILE_MONEY]
        solde:
          type: integer
        dateDernierSolde:
          type: string
          format: date

        compteBancaire:
          type: object
          required: [nomTitulaire, banque, numeroCompte]
          properties:
            nomTitulaire:
              type: string
            banque:
              type: string
              enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]
            numeroCompte:
              type: string
              maxLength: 23
              minLength: 23
        compteMobile:
          type: object
          required: [nomTitulaire, operateur, numero]
          properties:
            nomTitulaire:
              type: string
            operateur:
              type: string
              enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
            numero:
              type: string

    CreationActivite:
      type: object
      required: [ titre, type, date, presenceObligatoire ]
      properties:
        titre:
          type: string
          example: "Formation sur la gestion des semences"
        type:
          type: string
          enum: [ ASSEMBLEE_GENERALE, FORMATION_JUNIOR, EXCEPTIONNELLE ]
          description: "Type d'activité selon le règlement de la fédération"
        date:
          type: string
          format: date
        presenceObligatoire:
          type: boolean
          default: false
        membresVises:
          type: string
          description: "Catégorie de membres concernés (ex: riziculteurs, nouveaux adhérents)"
        collectivitesInvitees:
          type: array
          items:
            type: string
          description: "Liste des IDs des collectivités invitées (utile pour les activités fédérales)"

    Activite:
      type: object
      properties:
        id:
          type: string
          description: "ID unique généré par le système"
        titre:
          type: string
        type:
          type: string
          enum: [ ASSEMBLEE_GENERALE, FORMATION_JUNIOR, EXCEPTIONNELLE ]
        date:
          type: string
          format: date
        presenceObligatoire:
          type: boolean
        membresVises:
          type: string
        collectivitesInvitees:
          type: array
          items:
            type: string

    CreationPresence:
      type: object
      required: [ membreId, statut ]
      properties:
        membreId:
          type: string
          example: "MEMB-001"
        statut:
          type: string
          enum: [ PRESENT, ABSENT, EXCUSE ]
        motifAbsence:
          type: string
          description: "Obligatoire si statut est ABSENT ou EXCUSE"

    Presence:
      type: object
      properties:
        id:
          type: string
          description: "ID unique de la ligne de présence"
        membreId:
          type: string
        statut:
          type: string
          enum: [ PRESENT, ABSENT, EXCUSE ]
        motifAbsence:
          type: string
        datePointage:
          type: string
          format: date-time
          description: "Horodatage automatique du pointage"

    RapportMensuel:
      type: object
      properties:
        collectiviteId:
          type: string
        mois:
          type: string
          example: "2026-04"
        nombreMembresInscrits:
          type: integer
        tauxAssiduiteMoyen:
          type: number
          format: float
          description: "Moyenne des présences de tous les membres sur le mois (%)"
        totalCotisationsCollectees:
          type: number
          description: "Somme totale des cotisations perçues ce mois-ci"

    StatistiquesMembre:
      type: object
      properties:
        membreId:
          type: string
        collectiviteId:
          type: string
        periode:
          type: object
          properties:
            debut:
              type: string
              format: date
            fin:
              type: string
              format: date
        tauxAssiduite:
          type: number
          format: float
          description: "Pourcentage de présence aux activités obligatoires"
        montantTotalVerse:
          type: number
          description: "Somme de toutes les cotisations payées sur la période"
        soldeRestantDu:
          type: number
          description: "Montant des impayés (cotisations non réglées)"

    RapportGlobal:
      type: object
      properties:
        collectiviteId: { type: string }
        nomCollectivite: { type: string }
        tauxAssiduiteGlobal: { type: number, format: float }
        pourcentageMembresAJour: { type: number, format: float }
        nombreNouveauxAdherents: { type: integer }