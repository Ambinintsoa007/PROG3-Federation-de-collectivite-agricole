openapi: 3.0.3
info:
  title: Federation Agricole API
  description: >
    Cette API permet de digitaliser les processus administratifs de la féderations agricoles à Madagascar. 
    Elle facilite la mise en relation entre les agriculteurs et les exportateurs.
  version: 1.0.0

tags:
  - name: Collectivités
    description: Gestion de l'ouverture et des statistiques des collectivités agricoles.
  - name: Membres
    description: Gestions des adhésion, des parrainages et des profiles.
  - name: Trésorerie
    description: Suivi des cotisations, des paiements et des comptes bancaires/mobiles.
  - name: Activités
    description: Planification et suivi de l'assiduité aux assemblés et formations.

paths:
  /collectivites:
    post:
      tags:
        - Collectivités
      summary: Créer une nouvelle collectivités.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationCollectivite'
      responses:
        '201':
          description: Collectivité créé avec succès.
        '400':
          description: Conditions non remplis.

components:
  schemas:
    CreationCollectivite:
      type: object
      required: [nom, numero, ville, specialite, membresFondateurs,responsableIds]
      properties:
        nom:
          type: string
        numero:
          type: string
        ville:
          type: string
        specialite:
          type: string
        membresFondateurs:
          type: array
          items:
            type: string
          minItems: 10
          description: Liste des 10 membres minimum
        responsableIds:
          type: object
          properties:
            president:
              type: string
            tresorier:
              type: string
            secretaire:
              type: string